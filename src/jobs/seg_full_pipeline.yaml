resources:
  jobs:
    seg_full_pipeline:
      name: seg_full_pipeline
      tasks:
        - task_key: bronze
          run_job_task:
            job_id: 891723582695671
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: src/pipeline/bronze_to_silver
            source: GIT
        - task_key: gold
          depends_on:
            - task_key: silver
          run_job_task:
            job_id: 202577512884647
      git_source:
        git_url: https://github.com/tomosantos/ic-ml-model
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
